server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        - id: monitoring-service
          uri: lb://MONITORING-SERVICE
          predicates:
            - Path=/applications/**

        - id: demo-service
          uri: lb://DEMO-SERVICE
          predicates:
              - Path=/demo/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**

logging:
  level:
    root: info
    org:
      springframework:
        cloud:
          gateway: INFO
          route:
            RoutePredicateHandlerMapping: TRACE

eureka:
  client:
    service-url:
      defaultZone: http://lakshay:lakshay@localhost:8761/eureka/
