server:
  port: 8082

spring:
  application:
    name: monitoring-service

  datasource:
    url: jdbc:postgresql://localhost:5433/serviceDB
    username: postgres
    password: changemeinprod!

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  graphql:
    graphiql:
      enabled: true

  kafka:
    bootstrap-servers: localhost:9092


eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://lakshay:lakshay@localhost:8761/eureka/

security:
